name: 构建并推送

on:
  push:
    tags:
      - "v*"
    branches:
      - dev
  workflow_dispatch:
    inputs:
      profile:
        description: "构建配置 (release/debug)"
        type: choice
        options: [ release, debug ]
        required: false
        default: release

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: 构建多平台镜像并推送到 GHCR
    runs-on: arc-runner-set

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 构建 builder 工具用于后续步骤
      - name: 构建 builder 工具
        run: cargo install --path crates/builder

      - name: 设置构建参数
        id: vars
        run: |
          PROFILE="${{ github.event.inputs.profile }}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/dev" ]; then PROFILE="debug"; fi
          if [ -z "$PROFILE" ]; then PROFILE="release"; fi
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"

      - name: 添加 MUSL 目标平台
        run: rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl

      - name: 安装 Zig 编译器
        uses: mlugg/setup-zig@v2

      - name: 安装 cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: 缓存 Cargo 构建产物
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: dashboard/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('dashboard/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 安装 Dashboard 依赖
        run: pnpm install
        working-directory: dashboard

      - name: 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 检查基础镜像可访问性
        run: |
          set -e
          # 使用 conv 生成 base 镜像标签（latest），用于后续检查
          BASE_IMAGE=$(builder tag base release -r ghcr -u convertor-gitops -v latest)

          echo "🔍 检查基础镜像: $BASE_IMAGE"
          echo "👤 当前登录用户: ${{ github.actor }}"
          echo "📦 仓库所有者: ${{ github.repository_owner }}"

          # 尝试 inspect 镜像
          if docker buildx imagetools inspect "$BASE_IMAGE" > /dev/null 2>&1; then
            echo "✅ 基础镜像可访问"
          else
            echo "❌ 基础镜像不可访问，尝试拉取..."
            if docker pull "$BASE_IMAGE"; then
              echo "✅ 基础镜像拉取成功"
            else
              echo "❌ 基础镜像拉取失败"
              exit 1
            fi
          fi

      - name: 使用 conv 构建并推送镜像（多架构）
        run: |
          # builder image convd 会自动：
          # 1. 构建二进制、Dashboard 和 Docker 镜像（多架构）
          # 2. 推送到指定的 registries
          # 3. 创建多架构 manifest（版本号 + latest 标签）
          builder image convd \
            ${{ steps.vars.outputs.profile }} \
            --arch amd,arm \
            --dashboard \
            --user ${{ github.repository_owner }} \
            --registries ghcr
